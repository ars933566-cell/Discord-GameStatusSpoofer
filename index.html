<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #2f3136; color: white; padding: 20px; }
    h2 { color: #5865F2; text-align: center; }
    label { display: block; margin: 10px 0 5px; font-size: 14px; color: #b9bbbe; }
    input { width: 95%; padding: 8px; background: #202225; border: 1px solid #000; color: white; border-radius: 4px; }
    button { width: 100%; padding: 12px; margin-top: 20px; background: #5865F2; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
    button:hover { background: #4752c4; }
  </style>
</head>
<body>
  <h2>GameStatusSpoofer Control</h2>
  
  <label>Discord Application ID (Optional)</label>
  <input type="text" id="appId" placeholder="Leave blank for default">

  <label>Game Name / Hover Text</label>
  <input type="text" id="gameName" placeholder="e.g., Grand Theft Auto VI">

  <label>Details (Line 1)</label>
  <input type="text" id="details" placeholder="e.g., Welcome To Vice City!">

  <label>State (Line 2)</label>
  <input type="text" id="state" placeholder="e.g., Playing Online">

  <label>Large Image URL</label>
  <input type="text" id="imageLink" placeholder="Direct image link (Imgur, etc.)">

  <button id="updateBtn">Update Discord Presence</button>

  <script>
    const { ipcRenderer } = require('electron');
    document.getElementById('updateBtn').addEventListener('click', () => {
      const data = {
        appId: document.getElementById('appId').value,
        gameName: document.getElementById('gameName').value,
        details: document.getElementById('details').value,
        state: document.getElementById('state').value,
        imageLink: document.getElementById('imageLink').value
      };
      ipcRenderer.send('update-status', data);
    });
  </script>
</body>
</html>
